openapi: 3.0.3
info:
  title: FoodMesh Restaurant Operations Platform API
  description: Complete production-ready REST API reference for the FoodMesh SaaS platform, managing auth, multi-tenant restaurants, location outlets, inventory, reservations, website checkout, Swiggy/Zomato webhook ingestion, billing, and dining operations cockpit.
  version: 1.0.0
servers:
  - url: http://localhost:5000/api/v1
    description: Local Development Server
  - url: https://staging.foodmesh.app/api/v1
    description: Staging Environment
  - url: https://api.foodmesh.app/api/v1
    description: Production Environment

security:
  - BearerAuth: []

paths:
  # Auth Endpoints
  /auth/register:
    post:
      summary: Register a new tenant admin user
      tags:
        - Authentication
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - name
                - tenantName
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 6
                name:
                  type: string
                tenantName:
                  type: string
      responses:
        '201':
          description: Tenant and user successfully created
        '400':
          description: Email already exists or invalid data

  /auth/login:
    post:
      summary: Authenticate tenant user and generate tokens
      tags:
        - Authentication
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: Logged in successfully, returns JWT
        '401':
          description: Invalid email or password

  /auth/me:
    get:
      summary: Retrieve current authenticated user profile
      tags:
        - Authentication
      responses:
        '200':
          description: Active session user data profile returned

  # Restaurants
  /restaurants:
    post:
      summary: Create a restaurant profile under the active tenant
      tags:
        - Restaurants
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                cuisineType:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: Restaurant successfully created

    get:
      summary: List all restaurants under active tenant
      tags:
        - Restaurants
      responses:
        '200':
          description: List of restaurants returned

  # Outlets
  /outlets:
    post:
      summary: Create a physical outlet location
      tags:
        - Outlets
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - restaurantId
                - address
              properties:
                name:
                  type: string
                restaurantId:
                  type: string
                address:
                  type: object
                  properties:
                    street:
                      type: string
                    city:
                      type: string
                    location:
                      type: object
                      properties:
                        coordinates:
                          type: array
                          items:
                            type: number
      responses:
        '201':
          description: Outlet successfully created

  /outlets/nearby:
    get:
      summary: Find outlets nearby (Public search)
      tags:
        - Outlets
      security: []
      parameters:
        - name: longitude
          in: query
          required: true
          schema:
            type: number
        - name: latitude
          in: query
          required: true
          schema:
            type: number
        - name: maxDistance
          in: query
          schema:
            type: number
      responses:
        '200':
          description: Array of nearby outlets returned

  # Public Flow (Website/QR)
  /public/o/{outletSlug}/menu:
    get:
      summary: Fetch public digital menu catalog for an outlet
      tags:
        - Public Client API
      security: []
      parameters:
        - name: outletSlug
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Returns menu categories, items, and variant structures

  /public/qr/resolve/{tableToken}:
    get:
      summary: Resolve dine-in QR token details
      tags:
        - Public Client API
      security: []
      parameters:
        - name: tableToken
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Returns active table description and QR session status

  /public/qr/orders:
    post:
      summary: Place QR Dine-In table order
      tags:
        - Public Client API
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - tableToken
                - customerName
                - customerPhone
                - items
              properties:
                tableToken:
                  type: string
                customerName:
                  type: string
                customerPhone:
                  type: string
                items:
                  type: array
                  items:
                    type: object
                    properties:
                      menuItemId:
                        type: string
                      quantity:
                        type: number
      responses:
        '201':
          description: Order placed and queued to KDS

  # Webhook Ingestion
  /integrations/mock/swiggy/orders:
    post:
      summary: Simulate incoming Swiggy order payload webhook
      tags:
        - Webhooks & Integration Gateways
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                order_id:
                  type: string
                outlet_id:
                  type: string
                customer:
                  type: object
                items:
                  type: array
                  items:
                    type: object
      responses:
        '200':
          description: Payload successfully ingested and logged

  /integrations/mock/zomato/orders:
    post:
      summary: Simulate incoming Zomato order payload webhook
      tags:
        - Webhooks & Integration Gateways
      security: []
      responses:
        '200':
          description: Payload successfully ingested and logged

  # Dining & Billing Operations
  /dining/tables:
    get:
      summary: List all tables for floor map
      tags:
        - Dine-In Operations
      responses:
        '200':
          description: Returns tables statuses

  /billing/sessions/{sessionId}/bill:
    post:
      summary: Generate session bill, apply tax, and close session
      tags:
        - Billing & POS
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: BillSession finalized

  # KDS
  /kds/orders:
    get:
      summary: Fetch active orders queue for KDS display screens
      tags:
        - Kitchen Display System
      responses:
        '200':
          description: Array of active preparation tickets returned

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
