<!doctype html>
<html lang="en" class="h-full bg-surface-subtle">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/omniserve_logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OmniServe - Restaurant Operations Platform</title>

    <!-- Fonts: preconnect first so the font files start fetching before CSS parses.
         Weights match what theme.css actually uses (Hanken 400-700, Inter 300-700,
         Plus Jakarta Sans 400-800) — loaded once, here, not duplicated via @import. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap"
      rel="stylesheet"
    />

    <script>
      (function() {
        // Must match the key ThemeContext.jsx reads ('theme'), not 'omniserve_theme' —
        // a mismatch here was causing a flash of the wrong theme on first paint.
        const theme = localStorage.getItem('theme') || 'system';
        if (theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>
  </head>
  <body class="h-full font-body-md text-on-surface antialiased bg-pattern bg-surface-subtle">
    <div id="root" class="h-full"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
