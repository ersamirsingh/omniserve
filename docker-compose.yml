services:
  mongodb:
    image: mongo:latest
    container_name: omniserve-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: omniserve-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: omniserve-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/omniserve
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=development
    depends_on:
      - mongodb
      - redis
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: omniserve-frontend
    ports:
      - "5173:80"
    depends_on:
      - server
    restart: unless-stopped

  order-simulator:
    build:
      context: ./order-simulator
      dockerfile: Dockerfile
    container_name: omniserve-order-simulator
    ports:
      - "5050:5050"
    environment:
      - PORT=5050
      - OMNISERVE_API_URL=http://server:5000/api/v1
    depends_on:
      - server
    restart: unless-stopped

volumes:
  mongo_data:
