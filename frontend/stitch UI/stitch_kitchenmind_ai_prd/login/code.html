<!DOCTYPE html>

<html class="h-full bg-surface-subtle" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Karigar Ops Platform - Login</title>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@600;700&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>

                        "surface-container-highest": "#e5e2e1",

<style type="text/tailwindcss">
        @layer utilities {
            .whisper-shadow {
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            }
            .glass-card {
                background: rgba(253, 253, 253, 0.85);
                backdrop-filter: blur(12px);
                -webkit-backdrop-filter: blur(12px);
                border: 1px solid theme('colors.border-base');
            }
        }
        
        .bg-pattern {
            background-image: radial-gradient(theme('colors.border-base') 1px, transparent 1px);
            background-size: 24px 24px;
        }
    </style>

<body class="h-full font-body-md text-on-surface antialiased bg-pattern bg-surface-subtle flex items-center justify-center p-4">
<!-- Main Container -->
<main class="w-full max-w-[420px]">
<!-- Brand Header -->
<div class="text-center mb-stack-lg">
<h1 class="font-display-lg text-display-lg text-primary tracking-tight">Karigar Ops</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant mt-2">Enterprise Management Platform</p>
</div>
<!-- Login Card -->
<div class="glass-card rounded-xl whisper-shadow p-8 relative overflow-hidden">
<!-- Decorative Accent -->
<div class="absolute top-0 left-0 w-full h-1 bg-primary-container"></div>
<div class="mb-stack-lg">
<h2 class="font-headline-md text-headline-md text-on-surface">Sign In</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-1">Access your operational dashboard.</p>
</div>
<form action="#" class="space-y-stack-md" method="POST">
<!-- Email Field -->
<div class="relative">
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-1" for="email">Email Address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant/50 text-[20px]" data-icon="mail">mail</span>
</div>
<input class="block w-full pl-10 pr-3 py-2.5 bg-surface-subtle border border-border-base rounded-lg font-body-md text-body-md text-on-surface placeholder-on-surface-variant/40 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-colors duration-200" id="email" name="email" placeholder="admin@restaurant.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="relative">
<div class="flex items-center justify-between mb-1">
<label class="block font-label-sm text-label-sm text-on-surface-variant" for="password">Password</label>
<a class="font-label-sm text-label-sm text-primary hover:text-primary-container transition-colors" href="#">Forgot password?</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant/50 text-[20px]" data-icon="lock">lock</span>
</div>
<input class="block w-full pl-10 pr-10 py-2.5 bg-surface-subtle border border-border-base rounded-lg font-body-md text-body-md text-on-surface placeholder-on-surface-variant/40 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-colors duration-200" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-on-surface-variant/50 hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center">
<input class="h-4 w-4 text-primary focus:ring-primary/20 border-border-base rounded bg-surface-subtle transition-colors cursor-pointer" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block font-body-sm text-body-sm text-on-surface-variant cursor-pointer" for="remember-me">
                        Remember me for 30 days
                    </label>
</div>
<!-- Submit Button -->
<button class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm font-label-md text-label-md text-on-primary bg-primary-container hover:bg-primary-container/90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary active:scale-[0.98] transition-all duration-150" type="submit">
                    Sign In
                </button>
</form>
<div class="mt-stack-lg">
<div class="relative">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-border-base"></div>
</div>
<div class="relative flex justify-center text-sm">
<span class="px-2 bg-surface-subtle font-label-sm text-label-sm text-on-surface-variant">Or continue with</span>
</div>
</div>
<div class="mt-stack-md">
<button class="w-full flex items-center justify-center gap-2 py-2.5 px-4 border border-border-base rounded-lg font-label-md text-label-md text-on-surface bg-surface-subtle hover:bg-surface-container-low focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-border-base transition-colors duration-150" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="shield_person">shield_person</span>
                        Enterprise SSO Login
                    </button>
</div>
</div>
</div>
<!-- Footer Links -->
<div class="mt-8 text-center flex items-center justify-center gap-4">
<a class="font-body-sm text-body-sm text-on-surface-variant hover:text-on-surface transition-colors" href="#">Privacy Policy</a>
<span class="w-1 h-1 rounded-full bg-border-base"></span>
<a class="font-body-sm text-body-sm text-on-surface-variant hover:text-on-surface transition-colors" href="#">Terms of Service</a>
</div>
</main>
